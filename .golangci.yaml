version: "2"

run:
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - revive
    - govet
    - misspell
    - unused
    - unparam
    - staticcheck
    - nilerr
    - usetesting
    - thelper
    - bodyclose
  exclusions:
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
  settings:
    revive:
      rules:
        - name: package-comments
          disabled: true

formatters:
  enable:
    - goimports
    - gofumpt
  settings:
    gofumpt:
      extra-rules: true
